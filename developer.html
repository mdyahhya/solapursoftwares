<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;

        }
        p {
            color: #666;

        .btn {
            display: inline-block;

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (id) {
                const normalizedId = id.toLowerCase();
                if (normalizedId === 'yahya-mundewadi' || normalizedId === 'yahya') {
                    window.location.href = 'https://yahya.in';
                }
            }
        }
    </script>
