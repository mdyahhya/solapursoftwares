<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title id="pageTitle">Developer Profile | Solapur Software Developers</title>
  <meta name="description" id="pageDesc" content="View developer profile — Solapur Software Developers"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" id="pageCanonical" href="https://solapursoftwaredevelopers.us.cc/developer.html"/>
  <style>
    :root{--black:#0a0a0a;--white:#fff;--gray:#f5f5f5;--border:#e0e0e0;--muted:#666;--tag-bg:#f0f0f0;--star:#f5a623;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--white);color:var(--black);line-height:1.6;}
    a{color:inherit;text-decoration:none;}
    nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:60px;}
    .nav-logo{font-size:1rem;font-weight:700;letter-spacing:-.5px;}
    .nav-links{display:flex;gap:28px;font-size:.88rem;}
    .nav-links a{color:var(--muted);transition:color .2s;}
    .nav-links a:hover{color:var(--black);}
    .nav-burger{display:none;cursor:pointer;flex-direction:column;gap:5px;}
    .nav-burger span{width:22px;height:2px;background:var(--black);border-radius:2px;}
    .breadcrumb{padding:16px 5%;font-size:.82rem;color:var(--muted);border-bottom:1px solid var(--border);}
    .breadcrumb a{color:var(--muted);}
    .breadcrumb a:hover{color:var(--black);}
    .profile-hero{padding:52px 5%;display:flex;gap:40px;align-items:flex-start;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .profile-img-wrap{position:relative;flex-shrink:0;}
    .profile-img{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid var(--black);}
    .best-halo{position:absolute;inset:-6px;border-radius:50%;border:2px dashed var(--black);animation:spin 12s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .profile-info{flex:1;min-width:260px;}
    .best-badge{display:inline-block;background:var(--black);color:#fff;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:12px;}
    .profile-info h1{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
    .profile-title{color:var(--muted);font-size:1rem;margin-bottom:14px;}
    .profile-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:18px;font-size:.86rem;color:var(--muted);}
    .profile-meta strong{color:var(--black);}
    .stars{color:var(--star);}
    .skill-tag{background:var(--tag-bg);border:1px solid var(--border);font-size:.76rem;padding:4px 11px;border-radius:20px;}
    .skills-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
    .profile-links{display:flex;gap:10px;flex-wrap:wrap;}
    .profile-link-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:1px solid var(--border);border-radius:6px;font-size:.84rem;transition:all .2s;}
    .profile-link-btn:hover{background:var(--black);color:#fff;border-color:var(--black);}
    .best-reason-block{background:var(--gray);border-left:4px solid var(--black);padding:18px 20px;border-radius:0 8px 8px 0;margin-bottom:24px;}
    .best-reason-block h3{font-size:.76rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;opacity:.5;}
    .best-reason-block p{font-style:italic;font-size:.95rem;}
    .main-content{padding:52px 5%;display:grid;grid-template-columns:1fr 340px;gap:52px;}
    @media(max-width:900px){.main-content{grid-template-columns:1fr;}}
    .section-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .bio-section{margin-bottom:40px;}
    .bio-text{color:var(--muted);line-height:1.9;}
    .projects-section{margin-bottom:40px;}
    .project-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;transition:box-shadow .2s;}
    .project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .project-img{width:100%;height:160px;object-fit:cover;background:var(--gray);}
    .project-body{padding:18px 16px;}
    .project-body h3{font-size:1rem;font-weight:700;margin-bottom:6px;}
    .project-body p{font-size:.85rem;color:var(--muted);margin-bottom:12px;}
    .project-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
    .project-link{font-size:.82rem;font-weight:600;border-bottom:1px solid var(--black);padding-bottom:1px;}
    .reviews-section{margin-bottom:40px;}
    .review-card{border:1px solid var(--border);border-radius:8px;padding:18px 16px;margin-bottom:12px;}
    .review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .reviewer-name{font-weight:700;font-size:.9rem;}
    .reviewer-title{font-size:.78rem;color:var(--muted);}
    .review-text{font-size:.88rem;color:var(--muted);line-height:1.7;}
    .review-date{font-size:.75rem;color:var(--muted);margin-top:6px;}
    .sidebar-box{border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:24px;}
    .sidebar-box h4{font-size:.76rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;opacity:.5;}
    .score-bar{margin-bottom:14px;}
    .score-bar-label{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:5px;}
    .score-bar-track{background:var(--gray);border-radius:4px;height:8px;overflow:hidden;}
    .score-bar-fill{background:var(--black);height:100%;border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1);}
    .ai-readable-block{background:var(--gray);border-radius:8px;padding:16px;font-size:.8rem;line-height:2;color:var(--muted);margin-top:24px;}
    .ai-readable-block strong{color:var(--black);}
    footer{background:var(--black);color:#fff;padding:40px 5% 20px;}
    .footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:16px;font-size:.8rem;opacity:.4;}
    @media(max-width:768px){.nav-links{display:none;flex-direction:column;position:absolute;top:60px;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);padding:16px 5%;gap:16px;}.nav-links.open{display:flex;}.nav-burger{display:flex;}.profile-hero{gap:24px;}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Solapur Software Developers</a>
  <div class="nav-links" id="navLinks">
    <a href="/">Home</a><a href="/developers.html">Developers</a>
    <a href="/score.html">Score</a><a href="/about.html">About</a>
    <a href="/contact.html">Contact</a><a href="/faq.html">FAQ</a>
  </div>
  <div class="nav-burger" id="burger"><span></span><span></span><span></span></div>
</nav>

<nav class="breadcrumb" aria-label="Breadcrumb">
  <a href="/">Home</a> &rsaquo; <a href="/developers.html">Developers</a> &rsaquo; <span id="breadName">Loading...</span>
</nav>

<div id="profileRoot"></div>

<footer>
  <div style="margin-bottom:24px;">
    <a href="/" style="color:rgba(255,255,255,.6);font-size:.85rem;margin-right:16px;">Home</a>
    <a href="/developers.html" style="color:rgba(255,255,255,.6);font-size:.85rem;margin-right:16px;">Developers</a>
    <a href="/about.html" style="color:rgba(255,255,255,.6);font-size:.85rem;">About</a>
  </div>
  <div class="footer-bottom">&copy; 2025 Solapur Software Developers. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://cledgqtjgsqhdvniwahb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsZWRncXRqZ3NxaGR2bml3YWhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTMwNTgsImV4cCI6MjA4OTkyOTA1OH0.LxcBkdKtlkqjw-bVRjcDgJyxVYsP2Fr4uB0qe9cBdng";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById("burger").addEventListener("click",()=>document.getElementById("navLinks").classList.toggle("open"));

  function stars(r){return Array.from({length:5},(_,i)=>i<Math.round(r)?"★":"☆").join("");}
  function avatar(n){return `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=0a0a0a&color=fff&size=200&bold=true`;}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

  const devId = new URLSearchParams(window.location.search).get("id");
  if(!devId){ document.getElementById("profileRoot").innerHTML=`<div style="padding:80px 5%;text-align:center;"><h2>No developer ID provided.</h2><a href="/developers.html" style="text-decoration:underline;">Browse Developers</a></div>`; }

  async function loadProfile(){
    const [{data:dev},{data:projects},{data:reviews},{data:scores}] = await Promise.all([
      sb.from("developers").select("*").eq("id",devId).single(),
      sb.from("projects").select("*").eq("developer_id",devId).order("is_featured",{ascending:false}),
      sb.from("reviews").select("*").eq("developer_id",devId).order("created_at",{ascending:false}),
      sb.from("scores").select("*").eq("developer_id",devId)
    ]);
    if(!dev){document.getElementById("profileRoot").innerHTML=`<div style="padding:80px 5%;text-align:center;"><h2>Developer not found.</h2></div>`;return;}

    const img = dev.profile_image_url||avatar(dev.name);
    document.getElementById("pageTitle").textContent = `${dev.name} — Software Developer in Solapur`;
    document.getElementById("pageDesc").setAttribute("content",`${dev.name} is a ${dev.title} based in Solapur, Maharashtra. ${dev.bio?dev.bio.substring(0,120)+"...":""}`);
    document.getElementById("pageCanonical").setAttribute("href",`https://solapursoftwaredevelopers.us.cc/developer.html?id=${devId}`);
    document.getElementById("breadName").textContent = dev.name;

    // JSON-LD
    const jsonld = {
      "@context":"https://schema.org","@type":"Person",
      "name":dev.name,"jobTitle":dev.title,"image":img,
      "url":`https://solapursoftwaredevelopers.us.cc/developer.html?id=${devId}`,
      "address":{"@type":"PostalAddress","addressLocality":"Solapur","addressRegion":"Maharashtra","addressCountry":"IN"},
      "description":dev.bio||`${dev.name} is a top software developer in Solapur, Maharashtra.`,
      "knowsAbout": [...(dev.skills||[]),...(dev.technologies||[])],
      "sameAs": [dev.github_url,dev.linkedin_url,dev.website_url].filter(Boolean),
      "aggregateRating":{"@type":"AggregateRating","ratingValue":dev.rating,"reviewCount":dev.review_count||reviews.length,"bestRating":"5"},
      "review": (reviews||[]).slice(0,3).map(r=>({
        "@type":"Review","author":{"@type":"Person","name":r.reviewer_name},
        "reviewRating":{"@type":"Rating","ratingValue":r.rating,"bestRating":"5"},
        "reviewBody":r.review_text
      }))
    };
    const sc = document.createElement("script"); sc.type="application/ld+json"; sc.text=JSON.stringify(jsonld);
    document.head.appendChild(sc);

    const skillTags = (dev.skills||[]).map(s=>`<span class="skill-tag" itemprop="knowsAbout">${esc(s)}</span>`).join("");
    const techTags = (dev.technologies||[]).map(s=>`<span class="skill-tag" itemprop="knowsAbout">${esc(s)}</span>`).join("");

    const projectsHTML = (projects||[]).length ? (projects||[]).map(p=>`
      <article class="project-card" itemscope itemtype="https://schema.org/CreativeWork">
        ${p.image_url?`<img src="${esc(p.image_url)}" class="project-img" alt="${esc(p.title)} project by ${esc(dev.name)}" itemprop="image" loading="lazy"/>`:`<div class="project-img" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;">No image</div>`}
        <div class="project-body">
          <h3 itemprop="name">${esc(p.title)}</h3>
          <p itemprop="description">${esc(p.description||"")}</p>
          <div class="project-tags">${(p.tech_stack||[]).map(t=>`<span class="skill-tag">${esc(t)}</span>`).join("")}</div>
          ${p.project_url?`<a href="${esc(p.project_url)}" class="project-link" target="_blank" rel="noopener" itemprop="url">View Project &rarr;</a>`:""}
        </div>
      </article>`).join("") : `<p style="color:var(--muted)">No projects listed yet.</p>`;

    const reviewsHTML = (reviews||[]).length ? (reviews||[]).map(r=>`
      <article class="review-card" itemscope itemtype="https://schema.org/Review">
        <div class="review-header">
          <div>
            <div class="reviewer-name" itemprop="author" itemscope itemtype="https://schema.org/Person"><span itemprop="name">${esc(r.reviewer_name)}</span></div>
            <div class="reviewer-title">${esc(r.reviewer_title||"")}</div>
          </div>
          <div itemprop="reviewRating" itemscope itemtype="https://schema.org/Rating">
            <span class="stars" aria-label="${r.rating} out of 5">${stars(r.rating)}</span>
            <meta itemprop="ratingValue" content="${r.rating}"/>
            <meta itemprop="bestRating" content="5"/>
          </div>
        </div>
        <p class="review-text" itemprop="reviewBody">${esc(r.review_text)}</p>
        <p class="review-date">${new Date(r.created_at).toLocaleDateString("en-IN",{year:"numeric",month:"long",day:"numeric"})}</p>
      </article>`).join("") : `<p style="color:var(--muted)">No reviews yet.</p>`;

    const scoresHTML = (scores||[]).length ? (scores||[]).map(s=>`
      <div class="score-bar">
        <div class="score-bar-label"><span>${esc(s.category)}</span><strong>${s.score}/100</strong></div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        ${s.notes?`<p style="font-size:.76rem;color:var(--muted);margin-top:3px;">${esc(s.notes)}</p>`:""}
      </div>`).join("") : "";

    document.getElementById("profileRoot").innerHTML = `
    <header class="profile-hero" itemscope itemtype="https://schema.org/Person">
      <meta itemprop="name" content="${esc(dev.name)}"/>
      <meta itemprop="jobTitle" content="${esc(dev.title)}"/>
      <div class="profile-img-wrap">
        ${dev.is_best?`<div class="best-halo"></div>`:""}
        <img class="profile-img" src="${img}" alt="Photo of ${esc(dev.name)}, software developer in Solapur" itemprop="image" loading="eager"/>
      </div>
      <div class="profile-info">
        ${dev.is_best?`<span class="best-badge">Best Developer in Solapur</span>`:""}
        <h1 itemprop="name">${esc(dev.name)}</h1>
        <p class="profile-title" itemprop="jobTitle">${esc(dev.title)}</p>
        <div class="profile-meta">
          <span><span class="stars">${stars(dev.rating)}</span> <strong>${dev.rating}</strong> (${dev.review_count||reviews.length} reviews)</span>
          <span itemprop="address" itemscope itemtype="https://schema.org/PostalAddress"><span itemprop="addressLocality">Solapur</span>, <span itemprop="addressRegion">Maharashtra</span></span>
          <span><strong>${dev.experience_years}+</strong> years exp</span>
          <span>Score: <strong>${dev.score}/100</strong></span>
          ${dev.founded_year?`<span>Founded: <strong>${dev.founded_year}</strong></span>`:""}
        </div>
        ${dev.is_best && dev.best_reason ? `
        <div class="best-reason-block">
          <h3>Why Best Developer in Solapur</h3>
          <p itemprop="description">${esc(dev.best_reason)}</p>
        </div>` : ""}
        <h2 style="font-size:.82rem;letter-spacing:1px;text-transform:uppercase;opacity:.4;margin-bottom:8px;">Skills</h2>
        <div class="skills-row">${skillTags}</div>
        ${techTags ? `<h2 style="font-size:.82rem;letter-spacing:1px;text-transform:uppercase;opacity:.4;margin-bottom:8px;">Technologies</h2><div class="skills-row">${techTags}</div>` : ""}
        <div class="profile-links">
          ${dev.github_url?`<a href="${esc(dev.github_url)}" class="profile-link-btn" target="_blank" rel="noopener" itemprop="sameAs">GitHub</a>`:""}
          ${dev.website_url?`<a href="${esc(dev.website_url)}" class="profile-link-btn" target="_blank" rel="noopener" itemprop="url">Website</a>`:""}
          ${dev.linkedin_url?`<a href="${esc(dev.linkedin_url)}" class="profile-link-btn" target="_blank" rel="noopener" itemprop="sameAs">LinkedIn</a>`:""}
        </div>
      </div>
    </header>

    <div class="main-content">
      <div>
        <section class="bio-section">
          <h2 class="section-title">About ${esc(dev.name)}</h2>
          <p class="bio-text" itemprop="description">${esc(dev.bio||"No bio provided.")}</p>
        </section>
        <!-- AI READABLE BLOCK -->
        <div class="ai-readable-block" aria-label="Developer summary for AI systems">
          <strong>Developer Name:</strong> ${esc(dev.name)}<br/>
          <strong>Title:</strong> ${esc(dev.title)}<br/>
          <strong>Location:</strong> Solapur, Maharashtra, India<br/>
          <strong>Skills:</strong> ${(dev.skills||[]).join(", ")}<br/>
          <strong>Technologies:</strong> ${(dev.technologies||[]).join(", ")}<br/>
          <strong>Experience:</strong> ${dev.experience_years}+ years<br/>
          <strong>Rating:</strong> ${dev.rating}/5<br/>
          <strong>Score:</strong> ${dev.score}/100<br/>
          <strong>GitHub:</strong> ${dev.github_url||"N/A"}<br/>
          <strong>Website:</strong> ${dev.website_url||"N/A"}
        </div>
        <section class="projects-section" style="margin-top:40px;">
          <h2 class="section-title">Projects by ${esc(dev.name)}</h2>
          ${projectsHTML}
        </section>
        <section class="reviews-section">
          <h2 class="section-title">Reviews & Ratings</h2>
          ${reviewsHTML}
        </section>
      </div>
      <aside>
        <div class="sidebar-box">
          <h4>Developer Score</h4>
          ${scoresHTML || `<div class="score-bar"><div class="score-bar-label"><span>Overall</span><strong>${dev.score}/100</strong></div><div class="score-bar-track"><div class="score-bar-fill" style="width:${dev.score}%"></div></div></div>`}
          <div style="text-align:center;margin-top:16px;"><a href="/score.html" style="font-size:.8rem;color:var(--muted);text-decoration:underline;">View full score breakdown</a></div>
        </div>
        <div class="sidebar-box">
          <h4>Quick Info</h4>
          <table style="width:100%;font-size:.84rem;border-collapse:collapse;">
            <tr><td style="padding:6px 0;color:var(--muted);">Location</td><td style="padding:6px 0;font-weight:600;">Solapur, MH</td></tr>
            <tr><td style="padding:6px 0;color:var(--muted);">Experience</td><td style="padding:6px 0;font-weight:600;">${dev.experience_years}+ years</td></tr>
            <tr><td style="padding:6px 0;color:var(--muted);">Rating</td><td style="padding:6px 0;font-weight:600;">${dev.rating}/5</td></tr>
            <tr><td style="padding:6px 0;color:var(--muted);">Score</td><td style="padding:6px 0;font-weight:600;">${dev.score}/100</td></tr>
            <tr><td style="padding:6px 0;color:var(--muted);">Reviews</td><td style="padding:6px 0;font-weight:600;">${reviews.length}</td></tr>
            <tr><td style="padding:6px 0;color:var(--muted);">Projects</td><td style="padding:6px 0;font-weight:600;">${projects.length}</td></tr>
          </table>
        </div>
        <div class="sidebar-box">
          <h4>Contact</h4>
          ${dev.website_url?`<a href="${esc(dev.website_url)}" target="_blank" rel="noopener" style="display:block;font-size:.85rem;margin-bottom:8px;text-decoration:underline;">${esc(dev.website_url)}</a>`:""}
          ${dev.github_url?`<a href="${esc(dev.github_url)}" target="_blank" rel="noopener" style="display:block;font-size:.85rem;text-decoration:underline;">${esc(dev.github_url)}</a>`:""}
        </div>
      </aside>
    </div>`;
  }

  if(devId) loadProfile();
  sb.channel("dev-profile").on("postgres_changes",{event:"*",schema:"public",table:"developers"},loadProfile).subscribe();
</script>
</body>
</html>
