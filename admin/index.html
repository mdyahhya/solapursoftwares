<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login</title>
  <meta name="robots" content="noindex, nofollow"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-box{background:#111;border:1px solid #222;border-radius:12px;padding:48px 40px;width:100%;max-width:400px;}
    .login-logo{font-size:.8rem;letter-spacing:2px;text-transform:uppercase;opacity:.3;margin-bottom:32px;}
    h1{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
    p{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:28px;}
    label{display:block;font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:6px;}
    input{width:100%;padding:11px 14px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:.9rem;margin-bottom:18px;outline:none;transition:border-color .2s;}
    input:focus{border-color:#555;}
    .btn{width:100%;padding:12px;background:#fff;color:#0a0a0a;border:none;border-radius:6px;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .error{background:#2a1010;border:1px solid #5a2020;border-radius:6px;padding:12px;font-size:.84rem;color:#ff8080;margin-bottom:16px;display:none;}
    .loading{display:none;text-align:center;font-size:.84rem;color:rgba(255,255,255,.4);margin-top:12px;}
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">Solapur Software Developers</div>
  <h1>Admin Access</h1>
  <p>This panel is restricted. Enter your credentials to continue.</p>
  <div class="error" id="errorMsg"></div>
  <form id="loginForm" novalidate>
    <label>Email</label>
    <input type="email" id="adminEmail" placeholder="admin@example.com" autocomplete="email" required/>
    <label>Password</label>
    <input type="password" id="adminPass" placeholder="••••••••" autocomplete="current-password" required/>
    <button type="submit" class="btn" id="loginBtn">Access Admin Panel</button>
    <div class="loading" id="loadingMsg">Authenticating...</div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://cledgqtjgsqhdvniwahb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsZWRncXRqZ3NxaGR2bml3YWhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTMwNTgsImV4cCI6MjA4OTkyOTA1OH0.LxcBkdKtlkqjw-bVRjcDgJyxVYsP2Fr4uB0qe9cBdng";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // If already logged in, redirect immediately
  sb.auth.getSession().then(({data}) => {
    if(data.session) window.location.href = "/admin/dashboard.html";
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("adminEmail").value.trim();
    const pass  = document.getElementById("adminPass").value;
    const errEl = document.getElementById("errorMsg");
    const loadEl = document.getElementById("loadingMsg");
    errEl.style.display = "none";
    loadEl.style.display = "block";
    document.getElementById("loginBtn").disabled = true;
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    loadEl.style.display = "none";
    document.getElementById("loginBtn").disabled = false;
    if(error){
      errEl.textContent = "Invalid credentials. Access denied.";
      errEl.style.display = "block";
    } else {
      window.location.href = "/admin/dashboard.html";
    }
  });
</script>
</body>
</html>
